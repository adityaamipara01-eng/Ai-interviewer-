<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Interviewer</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-900 text-gray-100">
  <div class="w-full max-w-md p-6 bg-dark-800 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-4 text-center">Sign In</h2>
    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm mb-1">Email</label>
        <input type="email" id="email" required class="w-full px-3 py-2 rounded bg-dark-700 focus:outline-none focus:ring-2 focus:ring-brand-500" />
      </div>
      <div>
        <label for="password" class="block text-sm mb-1">Password</label>
        <input type="password" id="password" required class="w-full px-3 py-2 rounded bg-dark-700 focus:outline-none focus:ring-2 focus:ring-brand-500" />
      </div>
      <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white py-2 rounded transition">Login</button>
    </form>
    <p class="mt-4 text-center text-sm">Don't have an account? <a href="signup.html" class="text-brand-300 hover:underline">Sign up</a></p>
  </div>
  <script>
    const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert('Login failed: ' + error.message);
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
